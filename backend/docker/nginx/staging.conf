# ── HTTP: redirect to HTTPS + serve Let's Encrypt challenges ─────────────────
server {
    listen 80;
    server_name staging.api.smartmove-ai.app;

    # Certbot webroot challenge — must stay on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

