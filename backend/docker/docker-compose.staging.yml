services:

  # ── PHP-FPM application ────────────────────────────────────────────────────
  app:
    container_name: smart_move_app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
    volumes:
      - ..:/var/www/html
      - ./php/production.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - smart_move_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "composer install --no-dev --optimize-autoloader --no-interaction &&
             php artisan storage:link &&
             php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan view:cache &&
             php-fpm"

  # ── Queue worker ───────────────────────────────────────────────────────────
  # Must stay alive for AI generation jobs (timeout 600s)
  queue:
    container_name: smart_move_queue
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
    volumes:
      - ..:/var/www/html
      - ./php/production.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - smart_move_network
    depends_on:
      - app
    command: >
      sh -c "composer install --no-dev --optimize-autoloader --no-interaction &&
             php artisan queue:work
             --sleep=3
             --tries=3
             --timeout=660
             --queue=high,default
             --max-time=3600"

  # ── Nginx + SSL ────────────────────────────────────────────────────────────
  nginx:
    container_name: smart_move_nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ..:/var/www/html
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - smart_move_network
    depends_on:
      - app

  # ── Certbot (SSL auto-renewal) ─────────────────────────────────────────────
  certbot:
    container_name: smart_move_certbot
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew every 12 hours (Let's Encrypt certs expire after 90 days)
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    container_name: smart_move_db
    image: mysql:8.0
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smart_move_network
    # Do NOT expose port 3306 to the host — only internal access
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    container_name: smart_move_redis
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - smart_move_network
    # Do NOT expose port 6379 to the host
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  certbot_www:
  certbot_conf:


networks:
  smart_move_network:
    driver: bridge
